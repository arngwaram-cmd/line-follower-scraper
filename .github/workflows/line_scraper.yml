name: Daily Line Followers Update
on:
  schedule:
    # ตั้งเวลา 00:58 UTC = 07:58 น. เวลาไทย
    - cron: '58 0 * * *'
  workflow_dispatch: # กดรันเองได้ด้วย

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install playwright axios
      - name: Run Scraper
        run: node scraper.js
